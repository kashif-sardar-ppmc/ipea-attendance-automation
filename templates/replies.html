<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Replies</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f5f6fa;
    font-family: 'Segoe UI', sans-serif;
}

.sidebar {
    height: 100vh;
    width: 240px;
    position: fixed;
    background: #2f3640;
    padding-top: 20px;
}

.sidebar h4 {
    color: white;
    text-align: center;
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    color: #dcdde1;
    padding: 12px 20px;
    text-decoration: none;
}

.sidebar a:hover {
    background: #40739e;
    color: white;
}

.main-content {
    margin-left: 240px;
    padding: 30px;
}

.card {
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4>Admin Panel</h4>
    <a href="/dashboard">📊 Dashboard</a>
    <a href="/fetch-reports">📁 Fetch Reports</a>
    <a href="/replies">💬 Replies</a>
    <a href="/logout" class="text-danger">🚪 Logout</a>
</div>

<!-- Main Content -->
<div class="main-content">

<h2 class="mb-4">Fetch Replies</h2>

<div class="card p-4 mb-4">

<form method="POST" class="row g-3 align-items-end">

<div class="col-md-4">
<label class="form-label">Select Month</label>
<input type="month" name="month" class="form-control" value="{{ selected_month }}">
</div>

<div class="col-md-2">
<button type="submit" class="btn btn-primary w-100">Fetch</button>
</div>

</form>

</div>

<!-- Reports Table -->

<div class="card p-4">

<h5 class="mb-3">Replies</h5>

<table class="table table-striped table-hover">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Title</th>
<th>Date</th>
<th>Status</th>
</tr>
</thead>

<tbody>
{% for reply in replies %}
<tr>
<td>{{ reply.id }}</td>
<td>{{ reply.title }}</td>
<td>{{ reply.date }}</td>
<td>
<span class="badge bg-{% if reply.status == 'Completed' %}success{% else %}warning{% endif %}">
{{ reply.status }}
</span>
</td>
</tr>
{% endfor %}
</tbody>

</table>

</div>

</div>

</body>
</html>
