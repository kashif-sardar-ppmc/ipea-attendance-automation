<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f6fa;
}

/* Sidebar */
.sidebar {
    height: 100vh;
    width: 240px;
    position: fixed;
    background: #2f3640;
    padding-top: 20px;
}

.sidebar h4 {
    color: white;
    text-align: center;
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    color: #dcdde1;
    padding: 12px 20px;
    text-decoration: none;
    transition: 0.3s;
}

.sidebar a:hover {
    background: #40739e;
    color: white;
}

/* Main content */
.main-content {
    margin-left: 240px;
    padding: 30px;
}

/* Cards */
.dashboard-card {
    border: none;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: transform 0.2s ease;
}

.dashboard-card:hover {
    transform: translateY(-5px);
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4>Admin Panel</h4>
    <a href="{{ url_for('dashboard')}}">📊 Dashboard</a>
    <a href="{{ url_for('fetch_reports') }}">📁 Fetch Reports</a>
    <a href="{{ url_for('replies') }}">💬 Replies</a>
    <a href="/logout" class="text-danger">🚪 Logout</a>
</div>

<!-- Main Content -->
<div class="main-content">

<h2 class="mb-4">Welcome, {{ user }}</h2>

<div class="row g-4">

<!-- Card 1 -->
<div class="col-md-4">
    <div class="card dashboard-card p-4">
        <h5>Total Employees</h5>
        <h2>128</h2>
        <p class="text-muted">Reports fetched this month</p>
    </div>
</div>

<!-- Card 2 -->
<div class="col-md-4">
    <div class="card dashboard-card p-4">
        <h5>Pending Replies</h5>
        <h2>23</h2>
        <p class="text-muted">Waiting for response</p>
    </div>
</div>

<!-- Card 3 -->
<div class="col-md-4">
    <div class="card dashboard-card p-4">
        <h5>Active Users</h5>
        <h2>54</h2>
        <p class="text-muted">Currently online</p>
    </div>
</div>
<div>
    {{ data | safe }}
</div>
</div>

</div>

</body>
</html>
